<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Atrium · Hillingdon Council</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // pathSegmentsToKeep=1 keeps the repo name segment (/HillingOne/).
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      l.pathname.slice(1).split('/').slice(0, pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
