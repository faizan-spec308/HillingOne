version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: atrium_postgres
    environment:
      POSTGRES_USER: atrium
      POSTGRES_PASSWORD: atrium
      POSTGRES_DB: atrium
    ports:
      - "5432:5432"
    volumes:
      - atrium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrium"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: atrium_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://atrium:atrium@postgres:5432/atrium
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  atrium_pgdata:
