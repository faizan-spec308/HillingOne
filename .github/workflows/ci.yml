name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrium/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --ignore=E501,E712

      - name: Import check — verify all modules resolve
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          GEMINI_API_KEY: ""
          JWT_SECRET: ci-test-secret
          ADMIN_SECRET: ci-test-admin
          CORS_ORIGINS: '["http://localhost:5173"]'
        run: |
          python -c "
          from app.config import settings
          from app.models.user import User
          from app.models.asset import Asset
          from app.models.booking import Booking
          from app.models.payment import Payment
          from app.routers import auth, search, bookings, payments, agent, staff, assets, reminders
          print('All Atrium imports OK')
          "

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: ci-test-secret
          ADMIN_SECRET: ci-test-admin
          GEMINI_API_KEY: ""
        run: |
          pip install -r requirements-dev.txt
          pytest

      - name: Dependency vulnerability scan (advisory)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrium/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: atrium/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ""
          VITE_BASE_URL: /HillingOne/

      - name: Dependency audit (advisory)
        run: npm audit --omit=dev || true
