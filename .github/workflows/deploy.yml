name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Frontend → GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: atrium/frontend/package-lock.json

      - name: Install dependencies
        working-directory: atrium/frontend
        run: npm ci

      - name: Build
        working-directory: atrium/frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_BASE_URL: /HillingOne/
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: atrium/frontend/dist
          branch: gh-pages
          clean: true
