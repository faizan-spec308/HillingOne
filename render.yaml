services:
  - type: web
    name: hillingone-api
    env: python
    plan: free
    rootDir: atrium/backend
    buildCommand: pip install -r requirements.txt && python -m alembic upgrade head && python -m app.seed.seed_data
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGINS
        value: '["https://faizan-spec308.github.io","http://localhost:5173","http://localhost:3000"]'
      - key: HOLD_DURATION_SECONDS
        value: "60"
      - key: DEFAULT_GOODWILL_CREDIT_PERCENTAGE
        value: "20"
